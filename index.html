<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="한은 경제학">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>한은 경제학 학습 앱</title>
  <style>
    :root {
      --bg:#f7faf9; --paper:#fff; --ink:#111827; --muted:#64748b; --line:#d8e3df;
      --brand:#0f766e; --soft:#e7f5f2; --warm:#b45309; --warm-soft:#fff7ed;
      --blue:#1d4ed8; --blue-soft:#eff6ff; --good:#047857; --good-soft:#ecfdf5;
      --bad:#b91c1c; --bad-soft:#fef2f2; --shadow:0 10px 28px rgba(15,23,42,.08);
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; font-family:Arial,"Malgun Gothic",sans-serif; color:var(--ink); background:var(--bg); letter-spacing:0; }
    header { position:sticky; top:0; z-index:10; background:rgba(255,255,255,.96); border-bottom:1px solid var(--line); backdrop-filter:blur(10px); }
    .top {
      max-width:980px;
      margin:0 auto;
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:8px;
      overflow-x:auto;
      overflow-y:hidden;
      white-space:nowrap;
      scrollbar-width:none;
      -webkit-overflow-scrolling:touch;
    }
    .top::-webkit-scrollbar { display:none; }
    h1 { flex:0 0 auto; margin:0; font-size:18px; line-height:1.25; }
    button, input, select { border:1px solid var(--line); border-radius:8px; min-height:42px; padding:10px 12px; font:inherit; background:#fff; color:var(--ink); }
    button { cursor:pointer; }
    button.primary { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
    .mode-tabs { display:flex; flex:0 0 auto; gap:8px; margin:0; }
    .mode-tabs button { flex:0 0 auto; white-space:nowrap; min-height:38px; padding:8px 11px; }
    .mode-tabs button.active { background:var(--brand); border-color:var(--brand); color:#fff; font-weight:700; }
    .bar { display:flex; flex:0 0 auto; align-items:center; gap:8px; }
    .bar input { width:260px; }
    .bar select { width:150px; }
    .bar button { flex:0 0 auto; white-space:nowrap; min-height:38px; padding:8px 11px; }
    nav { max-width:980px; margin:0 auto; overflow-x:auto; display:flex; gap:8px; padding:0 14px 12px; scrollbar-width:none; }
    nav::-webkit-scrollbar { display:none; }
    nav button { white-space:nowrap; min-height:38px; padding:8px 11px; font-size:14px; }
    nav button.active { background:var(--soft); border-color:#9ed6cf; color:var(--brand); font-weight:700; }
    main { max-width:980px; margin:0 auto; padding:12px; }
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
    .stat { background:var(--paper); border:1px solid var(--line); border-radius:8px; padding:10px; box-shadow:var(--shadow); }
    .stat strong { display:block; font-size:19px; }
    .stat span { display:block; color:var(--muted); font-size:12px; margin-top:3px; }
    .unit-title { display:flex; justify-content:space-between; align-items:flex-end; gap:10px; margin:18px 0 10px; }
    h2 { margin:0; font-size:20px; line-height:1.35; }
    .unit-title small { color:var(--muted); white-space:nowrap; }
    .keyword-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px; }
    .card, .question { background:var(--paper); border:1px solid var(--line); border-radius:8px; box-shadow:var(--shadow); overflow:hidden; margin-bottom:12px; }
    .card summary { list-style:none; cursor:pointer; padding:13px; min-height:70px; }
    .card summary::-webkit-details-marker { display:none; }
    .keyword-head { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
    h3 { margin:0; font-size:16px; line-height:1.35; word-break:keep-all; overflow-wrap:anywhere; }
    .tag, .badge { display:inline-block; border-radius:999px; padding:3px 8px; font-size:12px; color:var(--brand); background:var(--soft); border:1px solid #b9ded8; }
    .hint { color:var(--muted); font-size:13px; line-height:1.45; margin-top:7px; }
    .body { border-top:1px solid var(--line); padding:13px; background:#fff; }
    .block { margin-bottom:12px; }
    .block:last-child { margin-bottom:0; }
    .label { display:inline-block; font-size:12px; font-weight:700; color:var(--brand); background:var(--soft); border-radius:999px; padding:3px 8px; margin-bottom:6px; }
    .label.warm { color:var(--warm); background:var(--warm-soft); }
    .label.blue { color:var(--blue); background:var(--blue-soft); }
    ul { margin:0; padding-left:18px; }
    li { margin:6px 0; line-height:1.55; word-break:keep-all; overflow-wrap:anywhere; }
    li.formula-item { list-style:none; margin-left:-18px; }
    .formula {
      display:block;
      max-width:100%;
      overflow-x:auto;
      overflow-y:hidden;
      white-space:nowrap;
      word-break:normal;
      overflow-wrap:normal;
      border:1px solid var(--line);
      border-radius:8px;
      background:#fbfefd;
      padding:9px 10px;
      margin:6px 0;
      font-family:"Cambria Math","STIX Two Math","Noto Sans Math","Segoe UI Symbol","Times New Roman",serif;
      font-size:15px;
      line-height:1.7;
      -webkit-overflow-scrolling:touch;
    }
    .formula .prefix {
      font-family:Arial,"Malgun Gothic",sans-serif;
      color:var(--muted);
      font-size:12px;
      margin-right:6px;
    }
    .formula .math {
      letter-spacing:.01em;
    }
    .formula sup, .formula sub {
      font-size:.72em;
      line-height:0;
    }
    .qhead { padding:13px; border-bottom:1px solid var(--line); }
    .qhead h2 { font-size:17px; line-height:1.55; margin-top:8px; word-break:keep-all; overflow-wrap:anywhere; }
    .prompt { padding:13px; line-height:1.65; white-space:pre-line; word-break:keep-all; overflow-wrap:anywhere; }
    .written-extra { border-top:1px solid var(--line); padding:13px; background:#fbfefd; }
    .written-extra .formula { margin:6px 0 8px; }
    .explain { margin-top:10px; line-height:1.6; word-break:keep-all; overflow-wrap:anywhere; }
    .choices { display:grid; gap:8px; padding:12px; }
    .choice { text-align:left; border:1px solid var(--line); border-radius:8px; background:#fff; padding:11px; line-height:1.45; word-break:keep-all; overflow-wrap:anywhere; }
    .choice.selected { outline:2px solid var(--brand); background:var(--soft); }
    .choice.correct { border-color:#86efac; background:var(--good-soft); color:#065f46; }
    .choice.wrong { border-color:#fecaca; background:var(--bad-soft); color:#991b1b; }
    .answer { display:none; border-top:1px solid var(--line); padding:12px; line-height:1.6; background:#fbfefd; word-break:keep-all; overflow-wrap:anywhere; }
    .answer.show { display:block; }
    .answer strong { color:var(--brand); }
    .actions { display:flex; gap:8px; padding:0 12px 12px; }
    .actions button { flex:1; }
    .empty { display:none; background:#fff; border:1px solid var(--line); border-radius:8px; padding:18px; text-align:center; color:var(--muted); }
    .fab { position:fixed; right:14px; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:20; width:48px; height:48px; border-radius:50%; border-color:var(--brand); background:var(--brand); color:#fff; box-shadow:var(--shadow); font-size:18px; padding:0; }
    mark { background:#fde68a; padding:0 2px; border-radius:3px; }
    @media (max-width:680px) {
      .top { max-width:none; padding:8px 10px; }
      h1 { font-size:16px; }
      main { padding:10px; }
      .keyword-grid { grid-template-columns:1fr; }
      .bar input { width:220px; }
      .stat { padding:9px 8px; }
      .stat strong { font-size:17px; }
      .card summary { min-height:auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <h1>한은 경제학 학습 앱</h1>
      <div class="mode-tabs">
        <button id="conceptMode" class="active">개념 요약</button>
        <button id="quizMode">객관식 연습</button>
        <button id="shortMode">약술형 문제</button>
        <button id="essayMode">논술 문제</button>
        <button id="noteMode">오답 노트</button>
      </div>
      <div class="bar" id="conceptBar">
        <input id="search" type="search" placeholder="키워드 검색: 독점, 테일러, 환율, OLS">
        <button class="primary" id="openAll">전체열기</button>
      </div>
      <div class="bar" id="quizBar" style="display:none">
        <select id="quizFilter">
          <option value="all">전체 문항</option>
          <option value="wrong">틀린 문항만</option>
          <option value="unanswered">안 푼 문항만</option>
        </select>
        <button class="primary" id="resetQuiz">기록 초기화</button>
      </div>
    </div>
    <nav id="tabs" aria-label="단원 선택"></nav>
  </header>
  <main>
    <section class="stats">
      <div class="stat"><strong id="statA">0</strong><span id="labelA">단원</span></div>
      <div class="stat"><strong id="statB">0</strong><span id="labelB">키워드</span></div>
      <div class="stat"><strong id="statC">0</strong><span id="labelC">표시중</span></div>
    </section>
    <section id="conceptView"></section>
    <section id="quizView" style="display:none"></section>
    <section id="shortView" style="display:none"></section>
    <section id="essayView" style="display:none"></section>
    <section id="noteView" style="display:none"></section>
    <div class="empty" id="empty">표시할 내용이 없습니다.</div>
  </main>
  <button class="fab" id="topBtn" aria-label="맨 위로">↑</button>
  <script>
    const DATA = [...([
      {
        unit: "미시경제",
        items: [
          {
            keyword: "소비자 선택",
            hint: "효용극대화와 수요 도출의 출발점",
            core: ["예산선 위에서 효용이 가장 큰 점을 고른다.", "내부해는 MRS = Px/Py, 코너해는 한계효용 대비 가격을 비교한다.", "마셜수요는 효용극대화, 힉스수요는 지출최소화에서 나온다."],
            memorize: ["라그랑지안 조건: MUx/MUy = Px/Py", "슬러츠키 분해: 총효과 = 대체효과 + 소득효과", "보통재는 소득 증가 때 수요 증가, 열등재는 감소 가능"],
            exam: ["수요함수, 간접효용, 지출함수, 보상변화 CV/EV 계산이 자주 나온다."]
          },
          {
            keyword: "대체탄력성",
            hint: "상대가격 변화에 투입·소비 비율이 얼마나 쉽게 바뀌는가",
            core: [
              "대체탄력성은 한계대체율 또는 한계기술대체율이 변할 때 두 재화·두 투입의 비율이 얼마나 민감하게 변하는지를 나타낸다.",
              "소비자 이론에서는 무차별곡선의 굽은 정도, 생산자 이론에서는 등량곡선의 굽은 정도를 읽는 지표다.",
              "값이 클수록 서로 대체하기 쉽고, 값이 작을수록 보완성이 강하다."
            ],
            memorize: [
              "σ = d ln(x/y) / d ln(MRS) 또는 σ = d ln(K/L) / d ln(MRTS)",
              "완전대체재: σ = ∞",
              "콥-더글라스: σ = 1",
              "레온티에프 완전보완재: σ = 0"
            ],
            exam: [
              "가격탄력성은 가격 변화에 대한 수요량 반응, 대체탄력성은 상대가격 변화에 대한 구성비 반응이다.",
              "CES 함수가 나오면 ρ 또는 대체탄력성 σ의 관계를 묻는 문제가 자주 나온다."
            ]
          },
          {
            keyword: "보상변화·대등변화",
            hint: "CV와 EV, 기준 가격을 헷갈리지 않는 것이 핵심",
            core: [
              "보상변화(CV)는 가격 변화 후의 새 가격에서 소비자를 원래 효용수준으로 되돌리기 위해 필요한 금액이다.",
              "대등변화(EV)는 가격 변화 전의 옛 가격에서 가격 변화와 같은 효용 변화를 만들기 위해 필요한 금액이다.",
              "일부 교재는 equivalent variation을 동등변화라고도 부르며, 대등변화와 같은 개념으로 쓰인다."
            ],
            memorize: [
              "CV = e(p_1, u_0) - e(p_1, u_1)",
              "EV = e(p_0, u_0) - e(p_0, u_1)",
              "가격하락 후 후생증가: CV와 EV의 부호는 교재 정의에 따라 달라질 수 있으므로 '지불의사/보상필요액' 방향을 먼저 확인"
            ],
            exam: [
              "CV는 새 가격 p_1에서 계산, EV는 옛 가격 p_0에서 계산한다고 기억한다.",
              "보상변화는 '변화 후 보상', 대등변화는 '변화 전 같은 효과'로 말로 풀어 쓰면 실수를 줄일 수 있다."
            ]
          },
          {
            keyword: "마셜수요·힉스수요",
            hint: "효용극대화 수요와 지출최소화 수요의 차이",
            core: [
              "마셜수요는 주어진 소득과 가격에서 효용을 극대화할 때의 수요다.",
              "힉스수요는 목표 효용을 최소비용으로 달성할 때의 보상수요다.",
              "가격 변화 효과를 대체효과와 소득효과로 나눌 때 힉스수요가 대체효과를 잡아준다."
            ],
            memorize: [
              "마셜수요: x(p, m)",
              "힉스수요: h(p, u)",
              "로이 항등식: x_i(p,m) = -V_{p_i}/V_m",
              "셰퍼드 보조정리: h_i(p,u) = ∂e(p,u)/∂p_i"
            ],
            exam: [
              "소득 m이 주어지면 마셜수요, 효용 u가 주어지면 힉스수요를 떠올린다.",
              "보상변화·대등변화 계산은 지출함수 e(p,u)와 힉스수요를 함께 쓰는 경우가 많다."
            ]
          },
          {
            keyword: "보통재·열등재·기펜재",
            hint: "소득효과 방향과 수요법칙 예외 구분",
            core: [
              "보통재는 소득이 증가하면 수요가 증가하고, 열등재는 소득이 증가하면 수요가 감소한다.",
              "기펜재는 강한 열등재라서 가격이 오를 때 오히려 수요가 증가하는 특수한 경우다.",
              "모든 기펜재는 열등재지만, 모든 열등재가 기펜재는 아니다."
            ],
            memorize: [
              "보통재: ∂x/∂m > 0",
              "열등재: ∂x/∂m < 0",
              "기펜재: ∂x/∂p > 0",
              "슬러츠키: 총효과 = 대체효과 + 소득효과"
            ],
            exam: [
              "가격이 오르면 대체효과는 항상 수요를 줄이는 방향이다.",
              "기펜재는 소득효과가 대체효과보다 크고 반대방향일 때만 가능하다."
            ]
          },
          {
            keyword: "탄력성 구분",
            hint: "가격탄력성, 소득탄력성, 교차탄력성, 대체탄력성 비교",
            core: [
              "가격탄력성은 자기 가격 변화에 대한 수요량 반응이다.",
              "소득탄력성은 소득 변화에 대한 수요량 반응이고, 재화가 보통재인지 열등재인지 판별한다.",
              "교차탄력성은 다른 재화 가격 변화에 대한 수요량 반응이고, 대체재·보완재 판별에 쓴다.",
              "대체탄력성은 수요량 하나가 아니라 두 재화 또는 두 투입의 비율 변화에 초점을 둔다."
            ],
            memorize: [
              "가격탄력성: ε_xp = (%Δx) / (%Δp_x)",
              "소득탄력성: ε_xm = (%Δx) / (%Δm)",
              "교차탄력성: ε_xy = (%Δx) / (%Δp_y)",
              "대체탄력성: σ = (%Δ(x/y)) / (%ΔMRS)"
            ],
            exam: [
              "독점 가격결정은 가격탄력성, 재화 성격은 소득탄력성, 대체·보완 관계는 교차탄력성을 먼저 본다.",
              "생산함수나 CES가 나오면 가격탄력성이 아니라 대체탄력성을 묻는 경우가 많다."
            ]
          },
          {
            keyword: "현시선호",
            hint: "관찰된 선택으로 선호를 추론하는 이론",
            core: [
              "소비자가 실제로 선택한 상품묶음은 살 수 있었던 다른 묶음보다 '직접 현시선호'된 것이다.",
              "약공리(WARP): A를 살 수 있을 때 B를 샀으면, B를 살 수 있을 때 A를 사지 않는다.",
              "강공리(SARP): 직접·간접 현시선호의 이행성. 이를 만족하면 효용함수가 존재한다."
            ],
            memorize: [
              "직접현시선호: p_0·x_0 ≥ p_0·x_1 이면 x_0 R x_1",
              "WARP: x_0 R x_1이고 x_1 ≠ x_0 이면 x_1이 x_0를 현시선호할 수 없음",
              "SARP: 현시선호 관계가 순환하면 합리성 위반"
            ],
            exam: [
              "가격·소득 변화 전후 선택 묶음이 주어지면 WARP 위반 여부를 확인한다.",
              "WARP 만족 → 보통재 수요법칙 성립, SARP 만족 → 효용함수 복원 가능."
            ]
          },
          {

        .replaceAll("κ", "κ")

      raw = raw.replace(/\^\{([^}]+)\}/g, "<sup>$1</sup>");
      raw = raw.replace(/_\{([^}]+)\}/g, "<sub>$1</sub>");
      raw = raw.replace(/\^([A-Za-z0-9+\-]+)/g, "<sup>$1</sup>");

          <summary>
            <div class="keyword-head"><h3>${idx + 1}. ${highlight(item.title, q)}</h3><span class="tag">${esc(item.year)}</span></div>
            <div class="hint">${esc(typeName)} · ${esc(item.source)} · ${item.tags.map(tag => esc(tag)).join(", ")}</div>
          </summary>
          <div class="prompt">${highlight(item.prompt, q)}</div>
          <div class="written-extra">
            ${item.formulas?.length ? `<div class="block"><span class="label">수식 메모</span>${item.formulas.map(renderWrittenFormula).join("")}</div>` : ""}
            ${item.exp ? `<div class="block"><span class="label blue">간단 해설</span><div class="explain">${highlight(item.exp, q)}</div></div>` : ""}
          </div>
        </details>`).join("");
      openAll.textContent = allOpen ? "전체닫기" : "전체열기";
    }
    function render() {
      renderTabs();
      conceptMode.classList.toggle("active", screen === "concept");
      quizMode.classList.toggle("active", screen === "quiz");
      shortMode.classList.toggle("active", screen === "short");
      essayMode.classList.toggle("active", screen === "essay");
      noteMode.classList.toggle("active", screen === "note");
      conceptBar.style.display = screen === "quiz" ? "none" : "flex";
      quizBar.style.display = screen === "quiz" ? "flex" : "none";
      conceptView.style.display = screen === "concept" ? "" : "none";
      quizView.style.display = screen === "quiz" ? "" : "none";
      shortView.style.display = screen === "short" ? "" : "none";
      essayView.style.display = screen === "essay" ? "" : "none";
      noteView.style.display = screen === "note" ? "" : "none";
      if (screen === "concept") renderConcepts();
      if (screen === "quiz") renderQuiz();
      if (screen === "short") renderWritten(SHORT_QUESTIONS, shortView, "약술형");
      if (screen === "essay") renderWritten(ESSAY_QUESTIONS, essayView, "논술");
      if (screen === "note") renderWritten(WRONG_NOTE_ITEMS, noteView, "오답 노트");
    }
    conceptMode.onclick = () => { screen = "concept"; selected = "전체"; render(); };
    quizMode.onclick = () => { screen = "quiz"; selected = "전체"; render(); };
    shortMode.onclick = () => { screen = "short"; selected = "전체"; render(); };
    essayMode.onclick = () => { screen = "essay"; selected = "전체"; render(); };
    noteMode.onclick = () => { screen = "note"; selected = "전체"; render(); };
    search.oninput = render;
    openAll.onclick = () => { allOpen = !allOpen; render(); };
    quizFilter.onchange = render;
    resetQuiz.onclick = () => { Object.keys(results).forEach(key => delete results[key]); saveQuiz(); render(); };
    topBtn.onclick = () => window.scrollTo({top:0, behavior:"smooth"});
    if ("serviceWorker" in navigator) window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
    render();
  </script>
</body>
</html>
